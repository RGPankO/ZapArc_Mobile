<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1024px; height: 500px; margin: 0; padding: 0; overflow: hidden; }
  .feature {
    width: 1024px;
    height: 500px;
    background: linear-gradient(145deg, #0a0a24 0%, #12123a 40%, #0a0a24 100%);
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  /* Radial glow behind icon */
  .feature::before {
    content: '';
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(247, 147, 26, 0.12) 0%, rgba(0, 122, 255, 0.06) 40%, transparent 70%);
    top: 50%;
    left: 240px;
    transform: translate(-50%, -50%);
  }
  /* Icon area */
  .icon-area {
    position: relative;
    margin-left: 80px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    border-radius: 48px;
    box-shadow:
      0 20px 80px rgba(0, 122, 255, 0.25),
      0 0 120px rgba(247, 147, 26, 0.08);
  }
  /* Text area */
  .text-area {
    margin-left: 70px;
    color: white;
  }
  .app-name {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    font-size: 58px;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 6px;
  }
  .app-name .zap { color: #ffffff; }
  .app-name .arc { color: #f7931a; }
  .tagline {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    font-size: 23px;
    font-weight: 400;
    color: rgba(200, 210, 240, 0.75);
    margin-bottom: 28px;
    line-height: 1.4;
  }
  .divider {
    width: 320px;
    height: 2px;
    background: linear-gradient(90deg, #f7931a, #007AFF, transparent);
    margin-bottom: 28px;
    opacity: 0.6;
  }
  .features {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .feature-row {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    font-size: 18px;
    color: rgba(200, 215, 245, 0.85);
  }
  .feature-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 15px;
    line-height: 1;
    text-align: center;
    padding-left: 4px;
  }
  .fi-bolt {
    background: rgba(247, 147, 26, 0.15);
    border: 1px solid rgba(247, 147, 26, 0.3);
  }
  .fi-blue {
    background: rgba(0, 122, 255, 0.15);
    border: 1px solid rgba(0, 122, 255, 0.3);
  }
  .fi-purple {
    background: rgba(123, 97, 255, 0.15);
    border: 1px solid rgba(123, 97, 255, 0.3);
  }
  .fi-green {
    background: rgba(52, 199, 89, 0.15);
    border: 1px solid rgba(52, 199, 89, 0.3);
  }
  .bottom-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #f7931a, #007AFF, #7B61FF, transparent);
  }
  /* Decorative arcs */
  .arc-deco {
    position: absolute;
    border: 1.5px solid rgba(88, 86, 214, 0.12);
    border-radius: 50%;
    z-index: 0;
  }
  .arc1 { width: 600px; height: 600px; top: -100px; left: -100px; }
  .arc2 { width: 400px; height: 400px; bottom: -80px; right: -60px; }
  .arc3 { width: 250px; height: 250px; top: 30px; right: 120px; border-color: rgba(247, 147, 26, 0.06); }
</style>
</head>
<body>
<div class="feature">
  <div class="arc-deco arc1"></div>
  <div class="arc-deco arc2"></div>
  <div class="arc-deco arc3"></div>

  <div class="icon-area">
    <canvas id="c" width="280" height="280"></canvas>
  </div>

  <div class="text-area">
    <div class="app-name"><span class="zap">Zap</span><span class="arc">Arc</span></div>
    <div class="tagline">Your Keys. Your Bitcoin.<br>Lightning Fast.</div>
    <div class="divider"></div>
    <div class="features">
      <div class="feature-row">
        <div class="feature-icon fi-bolt">⚡</div>
        <span>Instant Lightning Payments</span>
      </div>
      <div class="feature-row">
        <div class="feature-icon fi-blue">🔗</div>
        <span>On-chain Bitcoin Support</span>
      </div>
      <div class="feature-row">
        <div class="feature-icon fi-purple">🔐</div>
        <span>Self-Custody · Your Keys</span>
      </div>
      <div class="feature-row">
        <div class="feature-icon fi-green" style="padding-bottom:2px">👛</div>
        <span>Multi-Wallet Management</span>
      </div>
    </div>
  </div>
  <div class="bottom-line"></div>
</div>

<script>
// ZapArc v6 icon — scaled to 280px
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = 280;
const S = W / 512;

// Rounded rect clip
ctx.beginPath();
ctx.roundRect(0, 0, W, W, 48);
ctx.clip();

// Background
const bg = ctx.createRadialGradient(256*S, 200*S, 50*S, 256*S, 300*S, 400*S);
bg.addColorStop(0, '#1a1a4a');
bg.addColorStop(0.6, '#0d0d2b');
bg.addColorStop(1, '#050510');
ctx.fillStyle = bg;
ctx.fillRect(0, 0, W, W);

// Orbital arcs
for (let i = 0; i < 4; i++) {
  const r = (90 + i * 45) * S;
  const alpha = 0.25 - i * 0.05;
  ctx.strokeStyle = `rgba(88, 86, 214, ${alpha})`;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.arc(256*S, 256*S, r, -Math.PI * 0.7 - i * 0.1, Math.PI * 0.2 + i * 0.1);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(256*S, 256*S, r, Math.PI * 0.3 - i * 0.1, Math.PI * 1.2 + i * 0.1);
  ctx.stroke();
}

// Center glow
const glow = ctx.createRadialGradient(256*S, 230*S, 20*S, 256*S, 260*S, 200*S);
glow.addColorStop(0, 'rgba(247, 147, 26, 0.30)');
glow.addColorStop(0.45, 'rgba(66, 122, 255, 0.12)');
glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
ctx.fillStyle = glow;
ctx.fillRect(0, 0, W, W);

// Lightning bolt
ctx.beginPath();
ctx.moveTo(296*S, 60*S);
ctx.lineTo(188*S, 238*S);
ctx.lineTo(273*S, 226*S);
ctx.lineTo(215*S, 452*S);
ctx.lineTo(326*S, 262*S);
ctx.lineTo(244*S, 278*S);
ctx.closePath();

// BTC orange gradient
const boltGrad = ctx.createLinearGradient(220*S, 60*S, 286*S, 452*S);
boltGrad.addColorStop(0, '#FFD27C');
boltGrad.addColorStop(0.28, '#F7931A');
boltGrad.addColorStop(0.62, '#007AFF');
boltGrad.addColorStop(1, '#7B61FF');
ctx.fillStyle = boltGrad;
ctx.shadowColor = '#007AFF';
ctx.shadowBlur = 18;
ctx.fill();
ctx.shadowBlur = 0;

// Edge
ctx.strokeStyle = 'rgba(225, 232, 255, 0.35)';
ctx.lineWidth = 1.5;
ctx.stroke();

// Highlight
ctx.beginPath();
ctx.moveTo(296*S, 60*S);
ctx.lineTo(188*S, 238*S);
ctx.lineTo(273*S, 226*S);
ctx.lineTo(246*S, 310*S);
ctx.lineTo(244*S, 278*S);
ctx.closePath();
const highlight = ctx.createLinearGradient(198*S, 60*S, 286*S, 310*S);
highlight.addColorStop(0, 'rgba(255, 255, 255, 0.22)');
highlight.addColorStop(0.65, 'rgba(255, 255, 255, 0.04)');
highlight.addColorStop(1, 'rgba(255, 255, 255, 0)');
ctx.fillStyle = highlight;
ctx.fill();

// Top glow point
const topGlow = ctx.createRadialGradient(286*S, 80*S, 2*S, 286*S, 80*S, 40*S);
topGlow.addColorStop(0, 'rgba(255, 220, 150, 0.5)');
topGlow.addColorStop(1, 'rgba(255, 220, 150, 0)');
ctx.fillStyle = topGlow;
ctx.fillRect(250*S, 40*S, 80*S, 80*S);
</script>
</body>
</html>
